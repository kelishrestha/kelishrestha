name: Corporate Security Metrics

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 2 AM UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: kelishrestha
          template: classic
          filename: github-metrics.svg

          # Base sections
          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Kathmandu
          config_display: large
          config_padding: 12

          # Languages (clean breakdown)
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_analysis_timeout: 15

          # Activity calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Notable repositories
          plugin_repositories: yes
          # plugin_repositories_featured: YOUR_USERNAME/project1,YOUR_USERNAME/project2
          plugin_repositories_affiliations: owner

          # Recent activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release

          # Achievements (professional level)
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed

          # Topics (security branding)
          plugin_topics: yes
          plugin_topics_limit: 10

          # Follow-up metrics
          plugin_followup: yes

          # Clean style
          config_output: svg
